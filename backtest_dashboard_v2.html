
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回测仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { padding: 20px; background: #f5f7fa; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 24px; }
        h1 { color: #333; margin-bottom: 24px; font-size: 28px; }
        .controls { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 14px; color: #666; font-weight: 500; }
        select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; min-width: 200px; background: white; cursor: pointer; }
        select:focus { outline: none; border-color: #409eff; }
        .tabs { display: flex; border-bottom: 1px solid #e4e7ed; margin-bottom: 24px; }
        .tab { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; color: #606266; font-size: 15px; font-weight: 500; transition: all 0.3s; }
        .tab:hover { color: #409eff; }
        .tab.active { color: #409eff; border-bottom-color: #409eff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .chart-container { height: 500px; margin-bottom: 24px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .summary-card { background: #f9fafc; border-radius: 10px; padding: 20px; border: 1px solid #eaecef; }
        .summary-card h3 { font-size: 14px; color: #909399; margin-bottom: 12px; font-weight: 500; }
        .summary-card .value { font-size: 28px; font-weight: 700; color: #303133; }
        .summary-card .value.positive { color: #67c23a; }
        .summary-card .value.negative { color: #f56c6c; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #ebeef5; }
        th { background: #f5f7fa; color: #606266; font-weight: 600; }
        tr:hover { background: #f9fafc; }
        .profit-positive { color: #67c23a; font-weight: 600; }
        .profit-negative { color: #f56c6c; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 回测仪表盘</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="detail">个股详情</div>
            <div class="tab" data-tab="summary">整体汇总</div>
        </div>
        
        <div class="tab-content active" id="detail-tab">
            <div class="controls">
                <div class="control-group">
                    <label>选择股票</label>
                    <select id="stock-select"></select>
                </div>
                <div class="control-group">
                    <label>选择行情阶段</label>
                    <select id="phase-select">
                        <option value="牛市">牛市 (2025/5/1 - 2025/10/31)</option>
                        <option value="震荡">震荡市 (2024/11/1 - 2025/4/1)</option>
                        <option value="熊市">熊市 (2024/5/20 - 2024/9/12)</option>
                    </select>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="price-chart"></canvas>
            </div>
            
            <h3 style="margin-bottom: 16px; color: #333;">交易记录</h3>
            <table id="trades-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>类型</th>
                        <th>价格</th>
                        <th>数量</th>
                        <th>利润</th>
                        <th>利润率</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="tab-content" id="summary-tab">
            <div class="controls">
                <div class="control-group">

                    </select>
                </div>
            </div>
            
            <div class="summary-grid" id="summary-grid"></div>
            
            <h3 style="margin: 32px 0 16px; color: #333;">所有股票回测结果</h3>

                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

        function updateChart() {
            const stockCode = document.getElementById('stock-select').value;
            const phase = document.getElementById('phase-select').value;
            const ctx = document.getElementById('price-chart').getContext('2d');

            // 销毁旧图表
            if (priceChart) priceChart.destroy();

            // 准备数据
            const prices = allData.prices[stockCode]?.[phase] || [];
            const trades = allData.trades[stockCode]?.[phase] || [];

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [
                        {
                            label: '收盘价',
                            data: prices.map(p => p.close),
                            borderColor: '#409eff',
                            backgroundColor: 'rgba(64, 158, 255, 0.1)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        },
                        {
                            label: '买入信号',
                            data: prices.map(p => trades.some(t => t.date === p.date && (t.type === '买入' || t.type === '加仓')) ? p.close : null),
                            borderColor: '#67c23a',
                            backgroundColor: '#67c23a',
                            pointStyle: 'triangle',
                            pointRadius: 10,
                            showLine: false
                        },
                        {
                            label: '卖出/结算信号',
                            data: prices.map(p => trades.some(t => t.date === p.date && (t.type === '卖出' || t.type === '结算')) ? p.close : null),
                            borderColor: '#f56c6c',
                            backgroundColor: '#f56c6c',
                            pointStyle: 'rectRot',
                            pointRadius: 10,
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: `${stockNames[stockCode]} - ${phase}`,
                            font: { size: 18, weight: '600' }
                        },
                        legend: { position: 'top' }
                    },
                    scales: {
                        x: { grid: { color: '#f0f0f0' } },
                        y: { grid: { color: '#f0f0f0' } }
                    }
                }
            });

            // 更新交易记录表格
            const tradesTbody = document.querySelector('#trades-table tbody');
            tradesTbody.innerHTML = '';
            trades.forEach(trade => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${trade.date}</td>
                    <td>${trade.type}</td>
                    <td>${trade.price.toFixed(2)}</td>
                    <td>${trade.qty}</td>
                    <td class="${trade.profit >= 0 ? 'profit-positive' : 'profit-negative'}">${trade.profit ? trade.profit.toFixed(2) : '-'}</td>
                    <td class="${trade.profitPct >= 0 ? 'profit-positive' : 'profit-negative'}">${trade.profitPct ? trade.profitPct.toFixed(2) + '%' : '-'}</td>
                `;
                tradesTbody.appendChild(tr);
            });
        }

        function updateSummary() {
            const phase = document.getElementById('summary-phase-select').value;
            const results = allData.results[phase] || [];

            // 更新汇总卡片
            const grid = document.getElementById('summary-grid');
            const avgWinRate = results.length ? (results.reduce((sum, r) => sum + r.winRate, 0) / results.length).toFixed(2) : 0;
            const avgReturn = results.length ? (results.reduce((sum, r) => sum + r.totalReturn, 0) / results.length).toFixed(2) : 0;
            const avgDrawdown = results.length ? (results.reduce((sum, r) => sum + r.maxDrawdown, 0) / results.length).toFixed(2) : 0;
            const avgAnnual = results.length ? (results.reduce((sum, r) => sum + r.annualReturn, 0) / results.length).toFixed(2) : 0;

            grid.innerHTML = `
                <div class="summary-card">
                    <h3>平均胜率</h3>
                    <div class="value">${avgWinRate}%</div>
                </div>
                <div class="summary-card">
                    <h3>平均总收益</h3>
                    <div class="value ${parseFloat(avgReturn) >= 0 ? 'positive' : 'negative'}">${avgReturn}%</div>
                </div>
                <div class="summary-card">
                    <h3>平均最大回撤</h3>
                    <div class="value">${avgDrawdown}%</div>
                </div>
                <div class="summary-card">
                    <h3>平均年化收益</h3>
                    <div class="value ${parseFloat(avgAnnual) >= 0 ? 'positive' : 'negative'}">${avgAnnual}%</div>
                </div>
            `;

            // 更新汇总表格
            const tbody = document.querySelector('#summary-table tbody');
            tbody.innerHTML = '';
            results.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.code}</td>
                    <td>${r.name}</td>
                    <td>${r.trades}</td>
                    <td>${r.winRate.toFixed(2)}%</td>
                    <td class="${r.totalReturn >= 0 ? 'profit-positive' : 'profit-negative'}">${r.totalReturn.toFixed(2)}%</td>
                    <td>${r.maxDrawdown.toFixed(2)}%</td>
                    <td class="${r.annualReturn >= 0 ? 'profit-positive' : 'profit-negative'}">${r.annualReturn.toFixed(2)}%</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
